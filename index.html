<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>数値解析 3Dグラフシミュレーション</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <h2>section 1.3 陽的スキーム</h2>

    <div id="controls">
        <label for="paramLambda">固定値 λ: </label>
        <input type="range" id="paramLambda" min="0" max="0.6" step="0.01" value="0.4">
        <span id="valLambda">0.4</span>
        <label for="paramN">固定値 N: </label>
        <input type="range" id="paramN" min="1" max="60" step="0.1" value="20">
        <span id="valN">20</span>
        <label for="funcSelect">初期関数を選択：</label>
        <select id="funcSelect">
            <option value="A">例1.8: x * sin^2(3 &pi; x)</option>
            <option value="B">例1.9: 不連続な関数</option>
            <option value="C">例1.10(3): min{x, 1-x}</option>
            <option value="D">例1.10(2): sin(&pi; x)</option>
        </select>
    </div>

    <div id="graph" style="width:100%; height:600px;"></div>
    <script src="src/script.js"></script>
</body>
</html>
